<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Achadinhos Imperdíveis</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f9f0f6 0%, #ede0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(233, 30, 140, 0.12);
      padding: 40px 32px 36px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #e91e8c, #7b2fbe);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 16px;
      font-weight: 700;
      color: #1a0a2e;
      line-height: 1.3;
    }

    .logo p {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e8e0f0;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: #1a0a2e;
      background: #fdf8ff;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #e91e8c;
      background: #fff;
    }

    .toggle-senha {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #aaa;
      line-height: 1;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e91e8c, #7b2fbe);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .erro {
      margin-top: 14px;
      background: #fff0f5;
      border: 1px solid #ffb3d1;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c0185a;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .erro.visivel { display: flex; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🛍️</div>
    <h1>Achadinhos Imperdíveis</h1>
    <p>Área restrita</p>
  </div>

  <form id="formLogin" autocomplete="off">
    <div class="field">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
        <button type="button" class="toggle-senha" id="toggleSenha" aria-label="Mostrar senha">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn" id="btnEntrar">Entrar</button>

    <div class="erro" id="msgErro">
      <span>❌</span>
      <span id="textoErro">Usuário ou senha incorretos.</span>
    </div>
  </form>
</div>

<script>
  const API = '/api/mirian-config';

  // Mostrar/ocultar senha
  document.getElementById('toggleSenha').addEventListener('click', function() {
    const input = document.getElementById('senha');
    if (input.type === 'password') {
      input.type = 'text';
      this.textContent = '🙈';
    } else {
      input.type = 'password';
      this.textContent = '👁️';
    }
  });

  document.getElementById('formLogin').addEventListener('submit', async function(e) {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value.trim();
    const senha   = document.getElementById('senha').value;
    const btn     = document.getElementById('btnEntrar');
    const erro    = document.getElementById('msgErro');
    const texto   = document.getElementById('textoErro');

    if (!usuario || !senha) {
      texto.textContent = 'Preencha todos os campos.';
      erro.classList.add('visivel');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verificando...';
    erro.classList.remove('visivel');

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'check-auth', username: usuario, password: senha })
      });

      const data = await res.json();

      if (res.ok && data.valid) {
        sessionStorage.setItem('miriam_u', usuario);
        sessionStorage.setItem('miriam_p', senha);
        window.location.href = './painel.html';
      } else {
        texto.textContent = data.error || 'Usuário ou senha incorretos.';
        erro.classList.add('visivel');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    } catch {
      texto.textContent = 'Erro de conexão. Tente novamente.';
      erro.classList.add('visivel');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  });
</script>

</body>
</html>
