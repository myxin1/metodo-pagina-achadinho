<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Achadinhos Imperdíveis</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f9f0f6 0%, #ede0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(233, 30, 140, 0.12);
      padding: 36px 32px 32px;
      width: 100%;
      max-width: 460px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #e91e8c, #7b2fbe);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header-left h1 {
      font-size: 16px;
      font-weight: 700;
      color: #1a0a2e;
      line-height: 1.3;
    }

    .header-left p {
      font-size: 12px;
      color: #888;
    }

    .btn-sair {
      background: none;
      border: 2px solid #e8e0f0;
      border-radius: 10px;
      padding: 7px 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-sair:hover {
      border-color: #e91e8c;
      color: #e91e8c;
    }

    .secao {
      background: #fdf8ff;
      border: 2px solid #f0e4f8;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .secao-titulo {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .link-atual {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #e8e0f0;
    }

    .link-atual span.icone { font-size: 20px; }

    .link-atual span.texto {
      font-size: 12px;
      color: #444;
      word-break: break-all;
      line-height: 1.5;
    }

    .link-atual.carregando span.texto { color: #bbb; font-style: italic; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="url"],
    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e8e0f0;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      color: #1a0a2e;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #e91e8c; }
    input.invalido { border-color: #e91e8c; background: #fff8fb; }

    .dica {
      margin-top: 7px;
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-salvar {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #25D366, #1a9e4a);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-salvar:hover  { opacity: 0.9; }
    .btn-salvar:active { transform: scale(0.98); }
    .btn-salvar:disabled { opacity: 0.6; cursor: not-allowed; }

    .aviso {
      margin-top: 14px;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .aviso.sucesso {
      background: #f0fff5;
      border: 1px solid #a8e6be;
      color: #1a7a3a;
    }

    .aviso.erro {
      background: #fff0f5;
      border: 1px solid #ffb3d1;
      color: #c0185a;
    }

    .aviso.visivel { display: flex; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">⚙️</div>
      <div>
        <h1>Painel da Miriam</h1>
        <p>Achadinhos Imperdíveis</p>
      </div>
    </div>
    <button class="btn-sair" id="btnSair">Sair</button>
  </div>

  <!-- Link atual -->
  <div class="secao">
    <div class="secao-titulo">Link atual do grupo</div>
    <div class="link-atual carregando" id="linkAtualWrap">
      <span class="icone">💬</span>
      <span class="texto" id="linkAtualTexto">Carregando...</span>
    </div>
  </div>

  <!-- Formulário de atualização -->
  <div class="secao">
    <div class="secao-titulo">Atualizar link do grupo</div>

    <label for="novoLink">Novo link do WhatsApp</label>
    <input
      type="text"
      id="novoLink"
      placeholder="https://chat.whatsapp.com/..."
    >
    <div class="dica">
      ℹ️ Cole aqui o link de convite do grupo do WhatsApp
    </div>
  </div>

  <button class="btn-salvar" id="btnSalvar">
    <span>💾</span> Salvar Link
  </button>

  <div class="aviso" id="aviso">
    <span id="avisoIcone"></span>
    <span id="avisoTexto"></span>
  </div>
</div>

<script>
  const API = '/api/mirian-config';

  // Verificar sessão
  const usuario = sessionStorage.getItem('miriam_u');
  const senha   = sessionStorage.getItem('miriam_p');

  if (!usuario || !senha) {
    window.location.href = './login.html';
  }

  // Carregar link atual
  async function carregarLink() {
    try {
      const r = await fetch(API);
      const d = await r.json();
      const wrap  = document.getElementById('linkAtualWrap');
      const texto = document.getElementById('linkAtualTexto');
      wrap.classList.remove('carregando');
      texto.textContent = d.link || '—';
    } catch {
      document.getElementById('linkAtualTexto').textContent = 'Erro ao carregar.';
    }
  }

  carregarLink();

  // Sair
  document.getElementById('btnSair').addEventListener('click', function() {
    sessionStorage.removeItem('miriam_u');
    sessionStorage.removeItem('miriam_p');
    window.location.href = './login.html';
  });

  // Salvar link
  document.getElementById('btnSalvar').addEventListener('click', async function() {
    const btn    = this;
    const link   = document.getElementById('novoLink').value.trim();
    const input  = document.getElementById('novoLink');
    const aviso  = document.getElementById('aviso');
    const icone  = document.getElementById('avisoIcone');
    const texto  = document.getElementById('avisoTexto');

    aviso.classList.remove('visivel', 'sucesso', 'erro');
    input.classList.remove('invalido');

    if (!link) {
      input.classList.add('invalido');
      icone.textContent = '❌';
      texto.textContent = 'O campo não pode ficar vazio.';
      aviso.classList.add('visivel', 'erro');
      input.focus();
      return;
    }

    const waRegex = /^https:\/\/chat\.whatsapp\.com\/[A-Za-z0-9]{10,}/;
    if (!waRegex.test(link)) {
      input.classList.add('invalido');
      icone.textContent = '❌';
      texto.textContent = 'Use um link de grupo do WhatsApp (chat.whatsapp.com/...).';
      aviso.classList.add('visivel', 'erro');
      input.focus();
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> Salvando...';

    try {
      const r = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'update', username: usuario, password: senha, link })
      });

      const d = await r.json();

      if (r.ok && d.success) {
        icone.textContent = '✅';
        texto.textContent = 'Link atualizado com sucesso! Pode levar até 1 minuto para aparecer no site.';
        aviso.classList.add('visivel', 'sucesso');
        document.getElementById('linkAtualTexto').textContent = link;
        document.getElementById('linkAtualWrap').classList.remove('carregando');
        document.getElementById('novoLink').value = '';
      } else {
        icone.textContent = '❌';
        texto.textContent = d.error || 'Erro ao salvar.';
        aviso.classList.add('visivel', 'erro');
      }
    } catch {
      icone.textContent = '❌';
      texto.textContent = 'Erro de conexão. Tente novamente.';
      aviso.classList.add('visivel', 'erro');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span>💾</span> Salvar Link';
    }
  });
</script>

</body>
</html>
