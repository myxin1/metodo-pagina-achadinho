<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Leads Capturados</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f1117;
      color: #fff;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .header {
      max-width: 820px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 { font-size: 20px; font-weight: 700; color: #25D366; }
    .header span { font-size: 13px; color: #666; }

    .stats {
      max-width: 820px;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1;
      min-width: 100px;
      text-align: center;
    }

    .stat-box .num { font-size: 28px; font-weight: 900; color: #25D366; }
    .stat-box .label { font-size: 12px; color: #888; margin-top: 2px; }

    .btns-top {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-top {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-export { background: #25D366; color: #fff; }
    .btn-refresh { background: #22263a; color: #aaa; border: 1px solid #2e3245; }

    .table-wrap {
      max-width: 820px;
      margin: 0 auto;
      background: #1a1d27;
      border-radius: 16px;
      border: 1px solid #2a2d3a;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; min-width: 560px; }
    thead tr { background: #22263a; }

    th {
      text-align: left;
      padding: 13px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    td {
      padding: 13px 16px;
      font-size: 13px;
      color: #ddd;
      border-top: 1px solid #22263a;
      vertical-align: middle;
    }

    tr:hover td { background: #1e2133; }

    .badge {
      display: inline-block;
      background: rgba(37,211,102,0.12);
      color: #25D366;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* Botão WhatsApp com mensagem */
    .btn-wpp {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #25D366;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 50px;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-wpp:hover { background: #1ebe58; }

    .btn-del {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      color: #e53935;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 50px;
      border: 1.5px solid #e53935;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn-del:hover { background: #e53935; color: #fff; }
    .btn-del:disabled { opacity: 0.4; cursor: not-allowed; }

    .numero-raw {
      font-size: 12px;
      color: #888;
      display: block;
      margin-top: 3px;
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #555;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 48px;
      color: #555;
    }

    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🧲 Leads Capturados</h1>
    <span id="ultima-atualizacao">Carregando...</span>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="num" id="total-leads">–</div>
      <div class="label">Total de leads</div>
    </div>
    <div class="stat-box">
      <div class="num" id="hoje-leads">–</div>
      <div class="label">Hoje</div>
    </div>
    <div class="stat-box" style="background:transparent;border:none;display:flex;align-items:center;justify-content:flex-end;flex:2;">
      <div class="btns-top">
        <button class="btn-top btn-refresh" onclick="carregarLeads()">↻ Atualizar</button>
        <button class="btn-top btn-export" onclick="exportarCSV()">⬇ Exportar CSV</button>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading">
      Carregando leads<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
    <table id="tabela" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>WhatsApp</th>
          <th>Respostas do Quiz</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">
      Nenhum lead capturado ainda. Aguarde as primeiras conversões!
    </div>
  </div>

  <script>
  const REPO     = 'myxin1/metodo-pagina-achadinho';
  const CHECKOUT = 'https://pay.kiwify.com.br/9VfZih9';
  let allLeads   = [];

  // Mensagem pré-definida para o WhatsApp (com histórico do quiz)
  function mensagemWpp(lead) {
    const { nome, historico } = lead;

    // Bloco personalizado baseado nas respostas
    let blocoQuiz = '';
    if (historico && historico.length) {
      blocoQuiz = '\n\n📋 *Vi suas respostas no quiz:*\n' +
        historico.map(h => `• *${h.pergunta}*\n  → ${h.resposta}`).join('\n');
    }

    return encodeURIComponent(
`Olá, ${nome}! 👋

Vi que você demonstrou interesse no *Método Página Achadinho* e quero te ajudar a dar o próximo passo! 🚀${blocoQuiz}

Com base no seu perfil, o Método é exatamente o que você precisa: uma *Landing Page profissional e completa* para captar leads qualificados e encher seus grupos de achadinhos todos os dias — com tráfego orgânico ou pago.

✅ Grupos lotados de leads quentes
✅ Leads prontos para comprar
✅ Resultados em poucos dias

⚠️ *Oferta por tempo limitado!* O valor promocional pode encerrar a qualquer momento.

👉 Garanta agora: ${CHECKOUT}`
    );
  }

  async function carregarLeads() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('tabela').style.display  = 'none';
    document.getElementById('empty').style.display   = 'none';

    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/issues?labels=lead&state=open&per_page=100&sort=created&direction=desc`,
        { headers: { 'Accept': 'application/vnd.github.v3+json' } }
      );
      const issues = await res.json();
      if (!Array.isArray(issues)) throw new Error('Resposta inválida');

      allLeads = issues.map((issue, i) => {
        const nome = (issue.body.match(/\*\*Nome:\*\* (.+)/) || [])[1]?.trim() || '–';
        const wpp  = (issue.body.match(/\*\*WhatsApp:\*\* (.+)/) || [])[1]?.trim() || '–';
        const data = (issue.body.match(/\*\*Data:\*\* (.+)/)     || [])[1]?.trim() || '–';

        // Extrai respostas do quiz
        const historico = [];
        const reBloco = /\*\*\d+\. (.+?)\*\*\n> (.+)/g;
        let m;
        while ((m = reBloco.exec(issue.body)) !== null) {
          historico.push({ pergunta: m[1].trim(), resposta: m[2].trim() });
        }

        return { i: issues.length - i, issueNumber: issue.number, nome, wpp, data, historico };
      });

      renderizar();
    } catch (e) {
      document.getElementById('loading').textContent = '⚠️ Erro ao carregar. Tente atualizar.';
    }
  }

  function renderizar() {
    document.getElementById('loading').style.display = 'none';

    const hoje      = new Date().toLocaleDateString('pt-BR');
    const hojeCount = allLeads.filter(l => l.data.startsWith(hoje)).length;

    document.getElementById('total-leads').textContent = allLeads.length;
    document.getElementById('hoje-leads').textContent  = hojeCount;
    document.getElementById('ultima-atualizacao').textContent =
      'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');

    if (allLeads.length === 0) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = allLeads.map(l => {
      const numeroLimpo = l.wpp.replace(/\D/g, '');
      const wppLink     = `https://wa.me/55${numeroLimpo}?text=${mensagemWpp(l)}`;

      const respostasHtml = l.historico && l.historico.length
        ? l.historico.map(h =>
            `<div style="margin-bottom:4px;">
               <span style="color:#888;font-size:10px;">${h.pergunta}</span><br>
               <span style="font-size:12px;font-weight:600;color:#ddd;">${h.resposta}</span>
             </div>`
          ).join('')
        : '<span style="color:#555;font-size:11px;">Sem respostas registradas</span>';

      return `
        <tr>
          <td><span class="badge">#${l.i}</span></td>
          <td><strong>${l.nome}</strong></td>
          <td>
            ${l.wpp}
            <span class="numero-raw">55${numeroLimpo}</span>
          </td>
          <td style="font-size:11px;max-width:220px;">${respostasHtml}</td>
          <td style="color:#888;font-size:11px;white-space:nowrap;">${l.data}</td>
          <td style="white-space:nowrap;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <a class="btn-wpp" href="${wppLink}" target="_blank">💬 Contatar</a>
            <button class="btn-del" id="del-${l.issueNumber}" onclick="excluirLead(${l.issueNumber})">🗑 Excluir</button>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('tabela').style.display = 'table';
  }

  function exportarCSV() {
    if (!allLeads.length) return alert('Nenhum lead para exportar.');
    const header = 'Nome,WhatsApp,Data';
    const rows   = allLeads.map(l => `"${l.nome}","${l.wpp}","${l.data}"`);
    const csv    = [header, ...rows].join('\n');
    const blob   = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a      = document.createElement('a');
    a.href       = URL.createObjectURL(blob);
    a.download   = `leads-achadinho-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
    a.click();
  }

  async function excluirLead(issueNumber) {
    if (!confirm('Excluir este lead? A ação não pode ser desfeita.')) return;

    const btn = document.getElementById('del-' + issueNumber);
    btn.disabled = true;
    btn.textContent = '⏳';

    try {
      const res = await fetch('/api/delete-lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ issueNumber })
      });

      if (res.ok) {
        // Remove da lista local e re-renderiza sem recarregar do GitHub
        allLeads = allLeads.filter(l => l.issueNumber !== issueNumber);
        document.getElementById('total-leads').textContent = allLeads.length;
        renderizar();
      } else {
        btn.disabled = false;
        btn.textContent = '🗑 Excluir';
        alert('Erro ao excluir. Tente novamente.');
      }
    } catch {
      btn.disabled = false;
      btn.textContent = '🗑 Excluir';
      alert('Erro de conexão. Tente novamente.');
    }
  }

  carregarLeads();
  setInterval(carregarLeads, 60000);
  </script>

</body>
</html>
